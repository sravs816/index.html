<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musical Instruments</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('https://img.pikbest.com/wp/202346/music-notes-isolated-pink-musical-in-3d-rendering_9748270.jpg!w700wp');
            background-size: cover;
            background-attachment: fixed; /* Enables parallax effect */
            background-position: center;
            animation: moveBackground 10s linear infinite; /* Adds moving effect */
        }

        @keyframes moveBackground {
            0% { background-position: center top; }
            50% { background-position: center center; }
            100% { background-position: center bottom; }
        }

        table {
            width: 90%;
            border-collapse: collapse;
            text-align: center;
            padding: 20px;
            perspective: 1000px; 
        }

        td {
            padding: 15px;
        }

        .music {
            position: relative;
            display: inline-block;
            width: 350px; /* Increased size */
            height: 350px; /* Increased size */
            margin: 15px;
            overflow: hidden;
            text-align: center;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease-in-out;
            transform-style: preserve-3d; 
        }

        .music:hover {
            transform: rotateY(10deg) scale(1.3); /* Enhanced hover effect */
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            transition: transform 0.3s ease-in-out;
        }

        .music-title {
            font-size: 22px;
            font-weight: bold;
            color: white;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            width: 90%;
            text-align: center;
            padding: 8px 0;
            border-radius: 10px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }
        h1 {
          font-size:75px;
          color:white;
          margin-top: 0px;
          font-family: sans-serif;
        }
    </style>
</head>
<body>
